<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FleetFlow — Premium Car Rental &amp; Fleet Management</title>
  <meta name="description" content="FleetFlow — Affordable, verified, instant car booking. Experience seamless mobility designed for modern professionals." />

  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet" />

  <script>

      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "outline-variant":              "#c6c6cd",
            "on-secondary":                 "#ffffff",
            "inverse-surface":              "#303032",
            "on-background":                "#1b1b1d",
            "on-secondary-fixed-variant":   "#003ea8",
            "tertiary-fixed-dim":           "#dec29a",
            "on-error-container":           "#93000a",
            "on-secondary-container":       "#fefcff",
            "primary":                      "#000000",
            "surface":                      "#fcf8fa",
            "on-primary-fixed":             "#131b2e",
            "error":                        "#ba1a1a",
            "secondary-fixed-dim":          "#b4c5ff",
            "on-tertiary-container":        "#98805d",
            "on-primary":                   "#ffffff",
            "primary-container":            "#131b2e",
            "tertiary-fixed":               "#fcdeb5",
            "tertiary":                     "#000000",
            "on-tertiary":                  "#ffffff",
            "surface-dim":                  "#dcd9db",
            "tertiary-container":           "#271901",
            "outline":                      "#76777d",
            "inverse-primary":              "#bec6e0",
            "background":                   "#fcf8fa",
            "primary-fixed-dim":            "#bec6e0",
            "on-secondary-fixed":           "#00174b",
            "secondary":                    "#0051d5",
            "surface-container-lowest":     "#ffffff",
            "secondary-container":          "#316bf3",
            "on-surface":                   "#1b1b1d",
            "surface-variant":              "#e4e2e4",
            "surface-container-high":       "#eae7e9",
            "surface-container-low":        "#f6f3f5",
            "on-error":                     "#ffffff",
            "secondary-fixed":              "#dbe1ff",
            "surface-container":            "#f0edef",
            "surface-tint":                 "#565e74",
            "error-container":              "#ffdad6",
            "on-primary-fixed-variant":     "#3f465c",
            "on-tertiary-fixed":            "#271901",
            "surface-container-highest":    "#e4e2e4",
            "inverse-on-surface":           "#f3f0f2",
            "on-primary-container":         "#7c839b",
            "surface-bright":               "#fcf8fa",
            "on-tertiary-fixed-variant":    "#574425",
            "primary-fixed":                "#dae2fd",
            "on-surface-variant":           "#45464d"
          },
          borderRadius: {
            "DEFAULT": "0.25rem",
            "lg":      "0.5rem",
            "xl":      "0.75rem",
            "2xl":     "1rem",
            "full":    "9999px"
          },
          spacing: {
            "xs":               "4px",
            "sm":               "12px",
            "md":               "24px",
            "lg":               "48px",
            "xl":               "80px",
            "base":             "8px",
            "gutter":           "24px",
            "margin-mobile":    "16px",

          fontSize: {
            "label-md":          ["14px", { "lineHeight": "1",   "letterSpacing": "0.05em", "fontWeight": "600" }],
            "label-sm":          ["12px", { "lineHeight": "1",   "fontWeight": "500" }],
            "headline-lg":       ["32px", { "lineHeight": "1.3", "letterSpacing": "-0.01em","fontWeight": "600" }],
            "body-lg":           ["18px", { "lineHeight": "1.6", "fontWeight": "400" }],
            "headline-md":       ["24px", { "lineHeight": "1.4", "fontWeight": "600" }],
            "body-sm":           ["14px", { "lineHeight": "1.5", "fontWeight": "400" }],
            "headline-xl":       ["48px", { "lineHeight": "1.2", "letterSpacing": "-0.02em","fontWeight": "700" }],

          maxWidth: {
            "container-max": "1280px"
          }
        }
      }
    };
  </script>

  <!-- Page-specific styles injected by router -->
  <style id="ff-page-styles"></style>

  <!-- Minimal global reset that doesn't conflict with Tailwind -->
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body  { margin: 0; padding: 0; font-family: 'Inter', system-ui, sans-serif; }
    img   { max-width: 100%; height: auto; display: block; }

    /* Material Symbols rendering */
    .material-symbols-outlined {
      font-family: 'Material Symbols Outlined';
      font-weight: normal;
      font-style: normal;
      font-size: 24px;
      line-height: 1;
      letter-spacing: normal;
      text-transform: none;
      display: inline-block;
      white-space: nowrap;
      word-wrap: normal;
      direction: ltr;
      -webkit-font-smoothing: antialiased;
    }
    /* Hide scrollbars for horizontal scroll sections */
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    /* Loading spinner shown while page fetches */
    #ff-loading {
      display: none;
      position: fixed; inset: 0;
      background: #fcf8fa;
      z-index: 9999;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 1rem;
      font-family: 'Inter', sans-serif;
    }
    #ff-loading.active { display: flex; }
    #ff-spinner {
      width: 40px; height: 40px;
      border: 3px solid #e4e2e4;
      border-top-color: #0051d5;
      border-radius: 50%;
      animation: ff-spin 0.8s linear infinite;
    }
    @keyframes ff-spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body class="bg-background text-on-background antialiased min-h-screen flex flex-col">

  <!-- Loading overlay -->
  <div id="ff-loading" aria-label="Loading page">
    <div id="ff-spinner"></div>
    <span style="color:#76777d;font-size:14px;">Loading…</span>
  </div>

  <!-- App mount point — full width, full height, no extra padding -->
  <div id="app-content" class="flex flex-col flex-1 w-full min-h-screen"></div>

  <!-- Main script entrypoint -->
  <script type="module" src="src/main.js"></script>
</body>
</html>
