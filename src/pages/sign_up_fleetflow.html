<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Sign Up - FleetFlow</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-container": "#f0edef",
                        "on-error-container": "#93000a",
                        "tertiary": "#000000",
                        "outline-variant": "#c6c6cd",
                        "tertiary-fixed": "#fcdeb5",
                        "on-primary-container": "#7c839b",
                        "on-error": "#ffffff",
                        "primary-container": "#131b2e",
                        "on-background": "#1b1b1d",
                        "secondary-fixed-dim": "#b4c5ff",
                        "secondary-container": "#316bf3",
                        "on-tertiary-fixed-variant": "#574425",
                        "on-secondary": "#ffffff",
                        "outline": "#76777d",
                        "on-primary": "#ffffff",
                        "background": "#fcf8fa",
                        "primary-fixed": "#dae2fd",
                        "on-secondary-fixed": "#00174b",
                        "surface": "#fcf8fa",
                        "on-primary-fixed-variant": "#3f465c",
                        "on-tertiary": "#ffffff",
                        "on-secondary-container": "#fefcff",
                        "surface-tint": "#565e74",
                        "on-primary-fixed": "#131b2e",
                        "on-surface": "#1b1b1d",
                        "tertiary-fixed-dim": "#dec29a",
                        "on-secondary-fixed-variant": "#003ea8",
                        "tertiary-container": "#271901",
                        "surface-variant": "#e4e2e4",
                        "error": "#ba1a1a",
                        "surface-dim": "#dcd9db",
                        "surface-container-lowest": "#ffffff",
                        "on-surface-variant": "#45464d",
                        "on-tertiary-container": "#98805d",
                        "surface-container-low": "#f6f3f5",
                        "primary-fixed-dim": "#bec6e0",
                        "inverse-on-surface": "#f3f0f2",
                        "surface-container-high": "#eae7e9",
                        "primary": "#000000",
                        "surface-bright": "#fcf8fa",
                        "error-container": "#ffdad6",
                        "inverse-surface": "#303032",
                        "surface-container-highest": "#e4e2e4",
                        "on-tertiary-fixed": "#271901",
                        "secondary": "#0051d5",
                        "inverse-primary": "#bec6e0",
                        "secondary-fixed": "#dbe1ff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "sm": "12px",
                        "gutter": "24px",
                        "xs": "4px",
                        "lg": "48px",
                        "md": "24px",
                        "xl": "80px",
                        "container-max": "1280px",
                        "margin-desktop": "32px",
                        "margin-mobile": "16px",
                        "base": "8px"
                    },
                    "fontFamily": {
                        "headline-lg": ["Inter"],
                        "body-md": ["Inter"],
                        "label-md": ["Inter"],
                        "body-lg": ["Inter"],
                        "headline-xl-mobile": ["Inter"],
                        "label-sm": ["Inter"],
                        "headline-xl": ["Inter"],
                        "body-sm": ["Inter"],
                        "headline-md": ["Inter"]
                    },
                    "fontSize": {
                        "headline-lg": ["32px", { "lineHeight": "1.3", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "body-md": ["16px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "label-md": ["14px", { "lineHeight": "1", "letterSpacing": "0.05em", "fontWeight": "600" }],
                        "body-lg": ["18px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "headline-xl-mobile": ["32px", { "lineHeight": "1.2", "letterSpacing": "-0.01em", "fontWeight": "700" }],
                        "label-sm": ["12px", { "lineHeight": "1", "fontWeight": "500" }],
                        "headline-xl": ["48px", { "lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "body-sm": ["14px", { "lineHeight": "1.5", "fontWeight": "400" }],
                        "headline-md": ["24px", { "lineHeight": "1.4", "fontWeight": "600" }]

                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-background text-on-surface font-body-md min-h-screen flex items-center justify-center">
<!-- Split Screen Layout -->
<main class="w-full max-w-[1440px] min-h-screen flex flex-col md:flex-row">
<!-- Left Side: Image & Branding -->
<div class="hidden md:flex flex-1 relative bg-surface-container overflow-hidden">
<div class="absolute inset-0 bg-cover bg-center" data-alt="A high-quality, professional photograph of a modern luxury car interior from the driver's perspective. The steering wheel is wrapped in premium leather, and the dashboard features sleek, high-tech digital displays. Soft, natural sunlight filters through the windshield, illuminating the meticulous stitching and brushed metal accents. The overall aesthetic is executive, sophisticated, and aligns with a modern SaaS light-mode design palette, emphasizing deep navy, crisp whites, and a sense of premium mobility." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuAfDIAWrx1kow4QrOTVbu9UGoUVOExWboKAsvTvEuWsaOW9YUs7L3xfF7YTzZMhAmOFrTRL1NXPDGZOXAvzYz_Pzfn8z1foMvwFoLwKGysXNk2HNqWwpRylDlqJ82ZkS2goQ4WiZ0Z8mXeycNxualEQhFzrhtYJtvUFux69JtDWVuWQdm4pu2KbGQwpWgdIib1K0kUJRH_pdAsRkrkDIrrsEigk19MJqfWGrp1AFb7hk27f4or8WRZ2DiC7N5GV6mE2Hmu3PVm4Pkg')"></div>
<div class="absolute inset-0 bg-gradient-to-t from-primary/80 to-transparent"></div>
<div class="relative z-10 p-margin-desktop flex flex-col justify-between h-full w-full">
<!-- Brand Logo -->
<div class="flex items-center gap-2 text-on-primary">
<span class="material-symbols-outlined text-[32px]" data-icon="directions_car">directions_car</span>
<span class="font-headline-md text-headline-md text-on-primary">FleetFlow</span>
</div>
<!-- Messaging -->
<div class="text-on-primary mb-xl">
<h1 class="font-headline-xl text-headline-xl mb-md">Join FleetFlow</h1>
<p class="font-body-lg text-body-lg max-w-md opacity-90">Experience premium mobility in minutes. Unlock a fleet of executive vehicles ready for your next journey.</p>
</div>
</div>
</div>
<!-- Right Side: Sign Up Form -->
<div class="flex-1 flex flex-col justify-center px-margin-mobile md:px-xl py-lg bg-surface">
<!-- Mobile Logo (Hidden on Desktop) -->
<div class="flex md:hidden items-center gap-2 text-primary mb-lg justify-center">
<span class="material-symbols-outlined text-[32px]" data-icon="directions_car">directions_car</span>
<span class="font-headline-md text-headline-md text-primary">FleetFlow</span>
</div>
<div class="w-full max-w-md mx-auto">
<div class="mb-lg text-center md:text-left">
<h2 class="font-headline-lg text-headline-lg text-on-surface mb-xs">Create your account</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Enter your details to get started.</p>
</div>
<form class="space-y-gutter">
<!-- Full Name -->
<div>
<label class="block font-label-md text-label-md text-on-surface mb-xs" for="fullName">Full Name</label>
<div class="relative">
<span class="absolute inset-y-0 left-0 pl-sm flex items-center text-outline pointer-events-none">
<span class="material-symbols-outlined text-[20px]" data-icon="person">person</span>
</span>
<input class="w-full pl-10 pr-sm py-sm bg-surface-container-lowest border border-outline-variant rounded-lg font-body-md text-body-md text-on-surface focus:outline-none focus:ring-2 focus:ring-secondary focus:border-secondary transition-shadow" id="fullName" placeholder="John Doe" type="text"/>
</div>
</div>
<!-- Email -->
<div>
<label class="block font-label-md text-label-md text-on-surface mb-xs" for="email">Email Address</label>
<div class="relative">
<span class="absolute inset-y-0 left-0 pl-sm flex items-center text-outline pointer-events-none">
<span class="material-symbols-outlined text-[20px]" data-icon="mail">mail</span>
</span>
<input class="w-full pl-10 pr-sm py-sm bg-surface-container-lowest border border-outline-variant rounded-lg font-body-md text-body-md text-on-surface focus:outline-none focus:ring-2 focus:ring-secondary focus:border-secondary transition-shadow" id="email" placeholder="john@example.com" type="email"/>
</div>
</div>
<!-- Phone Number -->
<div>
<label class="block font-label-md text-label-md text-on-surface mb-xs" for="phone">Phone Number</label>
<div class="relative">
<span class="absolute inset-y-0 left-0 pl-sm flex items-center text-outline pointer-events-none">
<span class="material-symbols-outlined text-[20px]" data-icon="call">call</span>
</span>
<input class="w-full pl-10 pr-sm py-sm bg-surface-container-lowest border border-outline-variant rounded-lg font-body-md text-body-md text-on-surface focus:outline-none focus:ring-2 focus:ring-secondary focus:border-secondary transition-shadow" id="phone" placeholder="+1 (555) 000-0000" type="tel"/>
</div>
</div>
<!-- Password -->
<div>
<label class="block font-label-md text-label-md text-on-surface mb-xs" for="password">Password</label>
<div class="relative">
<span class="absolute inset-y-0 left-0 pl-sm flex items-center text-outline pointer-events-none">
<span class="material-symbols-outlined text-[20px]" data-icon="lock">lock</span>
</span>
<input class="w-full pl-10 pr-10 py-sm bg-surface-container-lowest border border-outline-variant rounded-lg font-body-md text-body-md text-on-surface focus:outline-none focus:ring-2 focus:ring-secondary focus:border-secondary transition-shadow" id="password" placeholder="••••••••" type="password"/>
<button class="absolute inset-y-0 right-0 pr-sm flex items-center text-outline hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="visibility_off">visibility_off</span>
</button>
</div>
</div>
<!-- Terms Checkbox -->
<div class="flex items-start gap-sm">
<div class="flex items-center h-5">
<input class="w-4 h-4 rounded border-outline-variant text-primary focus:ring-primary bg-surface-container-lowest" id="terms" type="checkbox"/>
</div>
<label class="font-body-sm text-body-sm text-on-surface-variant" for="terms">
                            I agree to the <a class="text-primary hover:text-secondary underline transition-colors" href="#">Terms of Service</a> and <a class="text-primary hover:text-secondary underline transition-colors" href="#">Privacy Policy</a>.
                        </label>
</div>
<!-- Submit Button -->
<button class="w-full py-sm px-md bg-primary text-on-primary font-label-md text-label-md rounded-lg hover:bg-surface-tint hover:shadow-[0_4px_6px_-1px_rgba(0,0,0,0.1),0_2px_4px_-2px_rgba(0,0,0,0.1)] transition-all flex items-center justify-center gap-2" type="submit">
                        Sign Up
                        <span class="material-symbols-outlined text-[18px]" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<!-- Sign In Link -->
<p class="mt-lg text-center font-body-sm text-body-sm text-on-surface-variant">
                    Already have an account? 
                    <a class="font-label-md text-label-md text-primary hover:text-secondary transition-colors" href="#">Sign In</a>
</p>
</div>
</div>
</main>
</body></html>
