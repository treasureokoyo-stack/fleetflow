<!-- src/pages/register.html -->
<div class="auth-wrapper">
  <div class="auth-card" style="max-width: 500px;">
    <div class="auth-header">
      <h1 class="auth-title">Create Account</h1>
      <p class="auth-subtitle">Join FleetFlow to book premium cars instantly</p>
    </div>

    <!-- Registration Form -->
    <form id="register-form" class="flex flex-col gap-4">
      <div id="register-general-error" class="alert alert-error" style="display: none;"></div>

      <div class="flex gap-4">
        <div class="form-group flex-1">
          <label for="register-first-name" class="form-label">First Name</label>
          <input type="text" id="register-first-name" required placeholder="John" class="form-input" />
        </div>
        <div class="form-group flex-1">
          <label for="register-last-name" class="form-label">Last Name</label>
          <input type="text" id="register-last-name" required placeholder="Doe" class="form-input" />
        </div>
      </div>

      <div class="form-group">
        <label for="register-email" class="form-label">Email Address</label>
        <input type="email" id="register-email" required placeholder="john.doe@example.com" class="form-input" />
        <div id="register-email-error" class="form-error" style="display: none;"></div>
      </div>

      <div class="form-group">
        <label for="register-phone" class="form-label">Phone Number</label>
        <input type="tel" id="register-phone" required placeholder="+1 (555) 123-4567" class="form-input" />
        <div id="register-phone-error" class="form-error" style="display: none;"></div>
      </div>

      <div class="form-group">
        <label for="register-password" class="form-label">Password</label>
        <input type="password" id="register-password" required minlength="8" placeholder="At least 8 characters" class="form-input" />
        <div id="register-password-error" class="form-error" style="display: none;"></div>
      </div>

      <button type="submit" class="btn btn-accent btn-full btn-lg mt-2" id="btn-register-submit">
        Create Account
      </button>
    </form>

    <p class="auth-subtitle mt-6 text-center" style="font-size: var(--font-size-xs);">
      Already have an account? <a href="#login" class="form-label" style="color: var(--color-accent); font-size: var(--font-size-xs);">Login here</a>
    </p>
  </div>
</div>
