<!DOCTYPE html>

<html class="light" lang="en"><head>

<title>Sign In - FleetFlow</title>
<!-- Material Symbols -->

<body class="h-screen w-full flex bg-surface-container-lowest font-body-md text-on-surface antialiased overflow-hidden">
<!-- Left Split: Image & Brand Welcome (Hidden on Mobile) -->
<div class="hidden lg:flex w-1/2 relative bg-surface-variant flex-col justify-between items-start overflow-hidden">
<!-- Background Image -->
<div class="absolute inset-0 w-full h-full bg-cover bg-center" data-alt="A sleek, modern luxury car parked in an expansive, pristine architectural space. The environment features clean white surfaces, subtle tonal lighting, and a refined premium aesthetic. The scene is brightly lit, emphasizing the high-fidelity details of the vehicle and the sophisticated, airy modern SaaS vibe. Deep navy and crisp white tones dominate the balanced composition." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuC-2YeAdO9N8FxBwiwbgJm5y_8P5ke-Rz_bvlNIRls9FUvrp9pQ0EVZZTTwat_3xmcUuA361MYyF5tR06MjKZNfhQAeJL_pQiN8D0iMtLaDeBy182ROJHUioKun99-Z5iqxmfF5xITXpH1O6trUBu7P12s1x1gYVR8RiXfLco8fXSevqlJqE3ywhAoK0vgDU-Vox3myXqluYdxFyBZ5a0IK2x2biqtGFBFN7HI7nWQ3JGksXg7t3P0UGPuq1JGg9NLVGbjYycG2eMQ')">
</div>
<!-- Gradient Overlay for readability -->
<div class="absolute inset-0 bg-gradient-to-t from-primary-container/80 via-primary-container/20 to-transparent"></div>
<!-- Brand Identifier Top Left -->
<div class="relative z-10 p-margin-desktop w-full flex items-center gap-xs text-on-primary">
<span class="material-symbols-outlined" style="font-size: 28px; font-variation-settings: 'FILL' 1;">directions_car</span>
<span class="font-headline-md text-headline-md tracking-tight">FleetFlow</span>
</div>
<!-- Welcome Message Bottom Left -->
<div class="relative z-10 p-margin-desktop w-full text-on-primary max-w-lg mb-xl">
<h1 class="font-headline-xl text-headline-xl mb-sm text-on-primary drop-shadow-md">Welcome Back</h1>
<p class="font-body-lg text-body-lg text-on-primary/90">Continue your journey with FleetFlow. Access your premium fleet and manage your rentals with seamless precision.</p>
</div>
</div>
<!-- Right Split: Sign In Form -->
<div class="w-full lg:w-1/2 flex items-center justify-center bg-surface-container-lowest overflow-y-auto px-margin-mobile md:px-margin-desktop relative">
<!-- Mobile Logo (Visible only on mobile/tablet) -->
<div class="absolute top-0 left-0 p-margin-mobile lg:hidden flex items-center gap-xs text-primary-container">
<span class="material-symbols-outlined" style="font-size: 24px; font-variation-settings: 'FILL' 1;">directions_car</span>
<span class="font-headline-md text-headline-md tracking-tight">FleetFlow</span>
</div>
<div class="w-full max-w-md flex flex-col gap-lg py-xl">
<!-- Form Header -->
<div class="flex flex-col gap-sm text-center lg:text-left">
<h2 class="font-headline-lg-mobile lg:font-headline-lg text-headline-lg-mobile lg:text-headline-lg text-on-surface">Sign In</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Enter your credentials to access your account.</p>
</div>
<!-- The Form -->
<form class="flex flex-col gap-md" onsubmit="event.preventDefault();">
<!-- Email Field -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface-variant pl-1" for="email">Email Address</label>
<div class="relative">
<span class="absolute inset-y-0 left-0 flex items-center pl-4 text-outline">
<span class="material-symbols-outlined" style="font-size: 20px;">mail</span>
</span>
<input class="w-full pl-12 pr-4 py-3 bg-transparent border border-outline-variant rounded-xl font-body-md text-body-md text-on-surface placeholder:text-outline focus:border-secondary focus:ring-2 focus:ring-secondary/30 outline-none transition-all duration-200" id="email" placeholder="name@company.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface-variant pl-1" for="password">Password</label>
<div class="relative">
<span class="absolute inset-y-0 left-0 flex items-center pl-4 text-outline">
<span class="material-symbols-outlined" style="font-size: 20px;">lock</span>
</span>
<input class="w-full pl-12 pr-4 py-3 bg-transparent border border-outline-variant rounded-xl font-body-md text-body-md text-on-surface placeholder:text-outline focus:border-secondary focus:ring-2 focus:ring-secondary/30 outline-none transition-all duration-200" id="password" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Actions Row -->
<div class="flex justify-end items-center mt-[-8px]">
<a class="font-label-sm text-label-sm text-secondary hover:text-on-secondary-fixed-variant transition-colors" href="#">Forgot Password?</a>
</div>
<!-- Primary Button -->
<button class="w-full bg-primary-container text-on-primary py-4 rounded-xl font-label-md text-label-md flex items-center justify-center gap-sm hover:opacity-90 transition-opacity mt-sm shadow-[0_4px_6px_-1px_rgba(0,0,0,0.1),_0_2px_4px_-2px_rgba(0,0,0,0.1)] hover:shadow-[0_6px_8px_-1px_rgba(0,0,0,0.15),_0_4px_6px_-2px_rgba(0,0,0,0.1)] active:translate-y-[1px]" type="submit">
                    Sign In
                    <span class="material-symbols-outlined" style="font-size: 18px;">arrow_forward</span>
</button>
</form>
<!-- Footer Link -->
<div class="text-center mt-sm">
<p class="font-body-sm text-body-sm text-on-surface-variant">
                    Don't have an account? 
                    <a class="font-label-md text-label-md text-secondary hover:text-on-secondary-fixed-variant transition-colors" href="#">Sign Up</a>
</p>
</div>
</div>
</div>
</body></html>
